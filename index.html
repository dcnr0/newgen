<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    /* Reset & basic styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Fullscreen Canvas for background particles */
    #space-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Container for layout */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      height: 100vh;
      padding: 20px;
      text-align: center;
    }

    /* Dummy div to keep flexbox centering balanced */
    .spacer {
      height: 20px;
    }

    /* Main Glowing Text */
    .glowing-text {
      color: #ffffff;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 
        0 0 5px rgba(255, 255, 255, 0.8),
        0 0 10px rgba(255, 255, 255, 0.6),
        0 0 20px rgba(255, 255, 255, 0.4),
        0 0 40px rgba(255, 255, 255, 0.2);
    }

    /* Bottom Link */
    .footer-link {
      color: #888888;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: #cccccc;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Particle Background Canvas -->
  <canvas id="space-canvas"></canvas>

  <!-- Content Container -->
  <div class="container">
    <div class="spacer"></div>

    <h1 class="glowing-text">this is a test html, will update later.</h1>

    <a href="https://zepti.neeb.wtf" class="footer-link" target="_blank" rel="noopener noreferrer">
      https://zepti.neeb.wtf
    </a>
  </div>

  <script>
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    // Handle window resizing
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // Particle settings
    const particleCount = 120;
    const particles = [];

    class Particle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.x = Math.random() * width;
        // If initial setup, scatter across screen; otherwise start below bottom
        this.y = initial ? Math.random() * height : height + Math.random() * 20;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = Math.random() * 0.8 + 0.2; // Upward velocity
        this.speedX = (Math.random() - 0.5) * 0.4; // Subtle sideways drift
        this.opacity = Math.random() * 0.8 + 0.2;
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX;

        // Reset particle when it floats off the top or sides
        if (this.y < -10 || this.x < -10 || this.x > width + 10) {
          this.reset(false);
        }
      }

      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Initialize particles
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    // Animation Loop
    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>

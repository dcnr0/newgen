        /* Reset & Base Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #080c14;
        }

        /* Dot Grid Canvas Background */
        #dot-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Layout Container */
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 24px;
            text-align: center;
        }

        /* Entrance Animations */
        @keyframes fadeInMinimal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated-item {
            opacity: 0;
            animation: fadeInMinimal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Shared Font for Title and Slogan */
        .brand, .slogan {
            font-family: 'NewgenCustomFont', 'Arial Black', 'Impact', system-ui, sans-serif;
            font-weight: 900;
            text-transform: lowercase;
            letter-spacing: -1px;
        }

        /* Title with High-Contrast Visible Yellow Gradient */
        .brand {
            font-size: 7.5vw;
            margin-bottom: 0.2rem;
            
            /* High Contrast Gradient */
            background: linear-gradient(180deg, #FFF59D 0%, #FFB300 100%);
            
            /* Text Clipping Properties */
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            
            display: inline-block;
        }

        /* Slogan */
        .slogan {
            font-size: 1.8vw;
            color: #FFE855;
            margin-bottom: 2.2rem;
        }

        /* Minimal Concept Description (Unbolded) */
        .portfolio-text {
            font-size: 1.15rem;
            width: 90%;
            max-width: 520px;
            font-weight: 400; /* Regular weight */
            line-height: 1.5;
            color: #94a3b8;
            margin-bottom: 0.8rem;
            text-transform: lowercase;
        }

        /* Clean Preview Bar Frame */
        .preview-bar {
            display: flex;
            align-items: center;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 2.5rem;
            width: 85%;
            max-width: 580px;
            border: 1px solid rgba(255, 232, 85, 0.3);
            background-color: #0b111e;
        }

        /* Lighter Dark Section with #fff188 Text */
        .url-static {
            background-color: #141c2e;
            padding: 12px 18px;
            font-family: 'Courier New', Courier, monospace;
            color: #fff188;
            font-weight: 900;
            font-size: 0.95rem;
            border-right: 1px solid rgba(255, 232, 85, 0.15);
        }

        /* Dark Section with Rotating Gray Text */
        .url-dynamic {
            background-color: #0b111e;
            flex-grow: 1;
            color: #8892b0;
            padding: 12px 18px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.95rem;
            transition: opacity 0.15s ease;
        }

        /* Button */
        .claim-btn {
            background-color: #FFE855;
            color: #000000;
            font-family: 'NewgenCustomFont', 'Arial Black', system-ui, sans-serif;
            font-size: 1.05rem;
            font-weight: 900;
            text-transform: lowercase;
            padding: 14px 36px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .claim-btn:hover {
            transform: translateY(-2px);
            background-color: #fff188;
        }
    </style>
</head>
<body>

    <canvas id="dot-canvas"></canvas>

    <div class="container">
        <h1 class="brand animated-item delay-1">newgen.</h1>
        
        <p class="portfolio-text animated-item delay-2">
            build your own portfolios that look as sharp as your work. express your unique identity, fast.
        </p>

        <p class="slogan animated-item delay-2">fast. clean. yours.</p>

        <div class="preview-bar animated-item delay-3">
            <span class="url-static">newgen.bot.nu /</span>
            <span class="url-dynamic" id="changing-word">identity</span>
        </div>

        <a href="#claim" class="claim-btn animated-item delay-4">claim your site</a>
    </div>

    <script>
        const canvas = document.getElementById('dot-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            drawDots();
        });

        const spacing = 40;

        function drawDots() {
            ctx.clearRect(0, 0, width, height);
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    ctx.fillStyle = '#162238';
                    ctx.beginPath();
                    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        drawDots();

        const dynamicWords = [
            'identity',
            'portfolios',
            'creative',
            'design',
            'showcase',
            'projects',
            'dynamic',
            'yours'
        ];

        let currentIndex = 0;
        const wordElement = document.getElementById('changing-word');

        setInterval(() => {
            wordElement.style.opacity = '0';
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % dynamicWords.length;
                wordElement.textContent = dynamicWords[currentIndex];
                wordElement.style.opacity = '1';
            }, 120);
        }, 1000);
    </script>

</body>
</html>
